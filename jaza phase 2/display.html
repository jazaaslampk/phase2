<!DOCTYPE html>
<html>
<head>
<title>Display</title>

<style>

h1 {
    color: brown;
}

h2 {
    display: block;
    background: lightblue;
}

h3 {
    display: inline;
    background: rgb(173, 233, 173);
}

h4 {
    display: inline-block;
    width: 150px;
    background: rgb(225, 170, 170);
}

img {
    width: 200px;
    height: 200px;
    display: block;
}

</style>
</head>

<body>

<h1>Dazzler Lipstick Display</h1>

<h2>Block - Dazzler Lipstick</h2>

<br>

<h3>Inline - Shade 0.25</h3>

<br><br>

<h4>Matte Finish</h4>
<h4>Long Lasting</h4>

<br><br>

<a href="https://www.amazon.in/s?k=dazzler+lipstick+shade+0.25" target="_blank">
    <img src="https://m.media-amazon.com/images/I/61Qe0euJJZL._SX679_.jpg" alt="Dazzler Lipstick">
</a>

</body>
</html>
